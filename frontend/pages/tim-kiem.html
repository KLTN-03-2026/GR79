<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tìm kiếm - Sách Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/book-list.css">
</head>
<body>
  <div id="site-header"></div>

  <!-- Main Content -->
  <main>
    <div class="container py-4">
      <!-- Breadcrumb -->
      <div class="breadcrumb-custom">
        <a href="/">Trang chủ</a>
        <span class="separator"><i class="bi bi-chevron-right"></i></span>
        <span class="current">Tìm kiếm</span>
      </div>

      <!-- Search Header -->
      <div class="search-header">
        <h1>Kết quả tìm kiếm cho: <span class="search-query" id="searchQuery"></span></h1>
        <div class="result-info" id="searchResultInfo"></div>
      </div>

      <!-- Sort Bar -->
      <div class="sort-bar">
        <div class="d-flex align-items-center gap-2">
          <span class="sort-label">Sắp xếp theo:</span>
          <div class="sort-options">
            <button class="sort-btn active" data-sort="relevant" onclick="changeSearchSort('relevant', this)">Phù hợp nhất</button>
            <button class="sort-btn" data-sort="newest" onclick="changeSearchSort('newest', this)">Mới nhất</button>
            <button class="sort-btn" data-sort="best_selling" onclick="changeSearchSort('best_selling', this)">Bán chạy</button>
            <button class="sort-btn" data-sort="price_asc" onclick="changeSearchSort('price_asc', this)">Giá tăng</button>
            <button class="sort-btn" data-sort="price_desc" onclick="changeSearchSort('price_desc', this)">Giá giảm</button>
          </div>
        </div>
      </div>

      <!-- Book Grid -->
      <div class="book-grid" id="searchGrid">
        <div class="text-center py-5">
          <div class="spinner-custom mx-auto"></div>
        </div>
      </div>

      <!-- Pagination -->
      <nav class="mt-4" id="paginationNav" style="display: none;">
        <ul class="pagination pagination-custom justify-content-center" id="pagination">
          <!-- Load via JS -->
        </ul>
      </nav>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/search.js"></script>
</body>
</html>
