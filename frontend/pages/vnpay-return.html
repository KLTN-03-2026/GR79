<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kết quả thanh toán - Sách Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .vnpay-result {
      max-width: 520px;
      margin: 60px auto;
      text-align: center;
      padding: 40px 30px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .result-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
    }
    .result-icon.success {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .result-icon.fail {
      background: #ffebee;
      color: #c62828;
    }
    .result-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .result-title.success { color: #2e7d32; }
    .result-title.fail { color: #c62828; }
    .result-desc {
      color: #666;
      margin-bottom: 24px;
      font-size: 15px;
    }
    .result-info {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 28px;
      text-align: left;
    }
    .result-info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
      border-bottom: 1px solid #eee;
    }
    .result-info-row:last-child { border-bottom: none; }
    .result-info-row .label { color: #888; }
    .result-info-row .value { font-weight: 600; color: #333; }
    .result-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-result {
      display: inline-block;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-result:hover { opacity: 0.85; }
    .btn-result.primary {
      background: #1a73e8;
      color: #fff;
    }
    .btn-result.secondary {
      background: #f1f3f5;
      color: #333;
      border: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <div class="vnpay-result" id="vnpayResult">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="result-info" id="resultInfo"></div>
    <div class="result-actions">
      <a href="/pages/don-hang.html" class="btn-result primary">Xem đơn hàng</a>
      <a href="/" class="btn-result secondary">Tiếp tục mua sắm</a>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const responseCode = params.get('vnp_ResponseCode');
      const txnRef = params.get('vnp_TxnRef');
      const amount = params.get('vnp_Amount');
      const transactionNo = params.get('vnp_TransactionNo');
      const payDate = params.get('vnp_PayDate');

      const iconEl = document.getElementById('resultIcon');
      const titleEl = document.getElementById('resultTitle');
      const descEl = document.getElementById('resultDesc');
      const infoEl = document.getElementById('resultInfo');

      // Gọi API backend để verify signature và cập nhật trạng thái đơn hàng
      fetch('/api/orders/vnpay-return' + window.location.search)
        .then(r => r.json())
        .catch(() => {});

      const isSuccess = responseCode === '00';

      if (isSuccess) {
        iconEl.classList.add('success');
        iconEl.innerHTML = '<i class="bi bi-check-lg"></i>';
        titleEl.classList.add('success');
        titleEl.textContent = 'Thanh toán thành công!';
        descEl.textContent = 'Đơn hàng của bạn đã được thanh toán thành công qua VNPay.';
      } else {
        iconEl.classList.add('fail');
        iconEl.innerHTML = '<i class="bi bi-x-lg"></i>';
        titleEl.classList.add('fail');
        titleEl.textContent = 'Thanh toán thất bại';
        descEl.textContent = 'Giao dịch không thành công. Vui lòng thử lại hoặc chọn phương thức thanh toán khác.';
      }

      // Format số tiền
      let amountDisplay = '---';
      if (amount) {
        const realAmount = parseInt(amount) / 100;
        amountDisplay = realAmount.toLocaleString('vi-VN') + ' VND';
      }

      // Format thời gian
      let dateDisplay = '---';
      if (payDate && payDate.length >= 14) {
        const y = payDate.substring(0, 4);
        const m = payDate.substring(4, 6);
        const d = payDate.substring(6, 8);
        const h = payDate.substring(8, 10);
        const mi = payDate.substring(10, 12);
        const s = payDate.substring(12, 14);
        dateDisplay = d + '/' + m + '/' + y + ' ' + h + ':' + mi + ':' + s;
      }

      let html = '';
      if (txnRef) {
        html += '<div class="result-info-row"><span class="label">Mã giao dịch</span><span class="value">' + txnRef + '</span></div>';
      }
      if (transactionNo && transactionNo !== '0') {
        html += '<div class="result-info-row"><span class="label">Mã giao dịch VNPay</span><span class="value">' + transactionNo + '</span></div>';
      }
      html += '<div class="result-info-row"><span class="label">Số tiền</span><span class="value">' + amountDisplay + '</span></div>';
      html += '<div class="result-info-row"><span class="label">Thời gian</span><span class="value">' + dateDisplay + '</span></div>';
      html += '<div class="result-info-row"><span class="label">Trạng thái</span><span class="value">' + (isSuccess ? 'Thành công' : 'Thất bại (Mã: ' + (responseCode || 'N/A') + ')') + '</span></div>';

      infoEl.innerHTML = html;
    })();
  </script>
</body>
</html>
