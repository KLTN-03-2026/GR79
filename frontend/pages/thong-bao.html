<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thông báo của tôi - Sách Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/profile.css">
  <style>
    .notif-wrapper { padding: 32px 0 64px; background: #F9FAFB; min-height: 60vh; }
    .notif-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .notif-header h1 { font-size: 26px; font-weight: 700; margin: 0; color: #1F2937; }
    .notif-tabs { display: flex; gap: 8px; border-bottom: 2px solid #E5E7EB; margin-bottom: 24px; }
    .notif-tab { padding: 12px 20px; border: none; background: transparent; font-weight: 600; color: #6B7280; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .2s; }
    .notif-tab:hover { color: #DC2626; }
    .notif-tab.active { color: #DC2626; border-bottom-color: #DC2626; }
    .notif-tab .count { display: inline-block; background: #FEE2E2; color: #DC2626; padding: 1px 8px; border-radius: 10px; font-size: 11px; margin-left: 6px; }
    .notif-list { display: flex; flex-direction: column; gap: 12px; }
    .notif-item { display: flex; gap: 16px; padding: 18px 20px; background: #fff; border-radius: 12px; border: 1px solid #E5E7EB; cursor: pointer; transition: all .2s; position: relative; }
    .notif-item:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); transform: translateY(-1px); }
    .notif-item.unread { background: #FEF2F2; border-color: #FECACA; }
    .notif-icon { flex-shrink: 0; width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .notif-icon.order { background: #DBEAFE; color: #2563EB; }
    .notif-icon.promotion { background: #FEF3C7; color: #D97706; }
    .notif-icon.system { background: #FEE2E2; color: #DC2626; }
    .notif-icon.general { background: #E0E7FF; color: #4F46E5; }
    .notif-body { flex: 1; min-width: 0; }
    .notif-title { font-weight: 700; color: #1F2937; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .notif-content { color: #6B7280; font-size: 14px; line-height: 1.5; margin-bottom: 6px; }
    .notif-meta { font-size: 12px; color: #9CA3AF; }
    .badge-new { background: #DC2626; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .empty-state { text-align: center; padding: 60px 20px; color: #9CA3AF; }
    .empty-state i { font-size: 64px; margin-bottom: 16px; opacity: .5; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <!-- Breadcrumb -->
  <div class="container">
    <div class="breadcrumb-custom">
      <a href="/">Trang chủ</a>
      <span class="separator"><i class="bi bi-chevron-right"></i></span>
      <span class="current">Thông báo</span>
    </div>
  </div>

  <div class="notif-wrapper">
    <div class="container">
      <div class="row g-4">
        <!-- Sidebar -->
        <div class="col-lg-3">
          <div class="profile-sidebar">
            <!-- User info -->
            <div class="sidebar-user">
              <div class="sidebar-avatar">
                <i class="bi bi-person-fill"></i>
              </div>
              <div class="sidebar-name" id="sidebarName">---</div>
              <span class="sidebar-badge">Thành viên</span>
            </div>

            <!-- Menu -->
            <ul class="sidebar-menu">
              <li><a href="/pages/ho-so.html"><i class="bi bi-person"></i> Hồ sơ cá nhân</a></li>
              <li><a href="/pages/don-hang.html"><i class="bi bi-box-seam"></i> Lịch sử đơn hàng</a></li>
              <li><a href="/pages/thong-bao.html" class="active"><i class="bi bi-bell"></i> Thông báo</a></li>
              <li><a href="/pages/voucher.html"><i class="bi bi-gift"></i> Ví ưu đãi & Voucher</a></li>
              <li><a href="/pages/dia-chi.html"><i class="bi bi-geo-alt"></i> Địa chỉ giao hàng</a></li>
              <li><a href="/pages/cai-dat.html"><i class="bi bi-gear"></i> Cài đặt tài khoản</a></li>
              <li class="menu-divider"></li>
              <li><a href="#" class="logout-link" onclick="logout(); return false;"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a></li>
            </ul>

            <!-- Stat Cards -->
            <div class="sidebar-cards">
              <div class="sidebar-stat-card">
                <div class="stat-icon"><i class="bi bi-star-fill"></i></div>
                <div class="stat-info">
                  <div class="stat-value" id="sidebarPoints">5000 Pts</div>
                  <div class="stat-label">Điểm tích lũy</div>
                </div>
              </div>
              <div class="sidebar-stat-card">
                <div class="stat-icon"><i class="bi bi-ticket-perforated"></i></div>
                <div class="stat-info">
                  <div class="stat-value" id="sidebarVouchers">0 mã giảm giá</div>
                  <div class="stat-label">Voucher hiện có</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Main -->
        <div class="col-lg-9">
          <div class="notif-header">
            <h1><i class="bi bi-bell-fill text-danger me-2"></i>Thông báo của tôi</h1>
            <button class="btn btn-outline-danger btn-sm" onclick="markAllRead()">
              <i class="bi bi-check2-all me-1"></i>Đánh dấu tất cả đã đọc
            </button>
          </div>

          <div class="notif-tabs">
            <button class="notif-tab active" data-filter="all" onclick="changeTab(this)">Tất cả</button>
            <button class="notif-tab" data-filter="unread" onclick="changeTab(this)">
              Chưa đọc <span class="count" id="unreadCount">0</span>
            </button>
            <button class="notif-tab" data-filter="read" onclick="changeTab(this)">Đã đọc</button>
          </div>

          <div id="notifList" class="notif-list">
            <div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Đang tải...</p></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/notifications.js"></script>
</body>
</html>
