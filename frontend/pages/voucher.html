<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ví ưu đãi & Voucher - Sách Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/profile.css">
  <style>
    .voucher-card {
      background: #fff;
      border: 1px solid var(--border);
      border-left: 4px solid var(--primary);
      border-radius: 12px;
      padding: 0;
      margin-bottom: 16px;
      display: flex;
      overflow: hidden;
      transition: var(--transition);
    }
    .voucher-card:hover {
      box-shadow: var(--shadow-sm);
      transform: translateY(-1px);
    }
    .voucher-card.expired {
      opacity: 0.55;
      border-left-color: #9CA3AF;
    }
    .voucher-card.used {
      opacity: 0.55;
      border-left-color: #6B7280;
    }
    .voucher-left {
      width: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #FFF7ED 0%, #FFEDD5 100%);
      padding: 20px 12px;
      flex-shrink: 0;
      border-right: 2px dashed var(--border);
    }
    .voucher-card.expired .voucher-left,
    .voucher-card.used .voucher-left {
      background: linear-gradient(135deg, #F3F4F6 0%, #E5E7EB 100%);
    }
    .voucher-type-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--primary);
      background: rgba(232, 73, 29, 0.1);
      padding: 2px 10px;
      border-radius: 20px;
      margin-bottom: 6px;
    }
    .voucher-card.expired .voucher-type-badge,
    .voucher-card.used .voucher-type-badge {
      color: #6B7280;
      background: rgba(107, 114, 128, 0.1);
    }
    .voucher-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }
    .voucher-card.expired .voucher-value,
    .voucher-card.used .voucher-value {
      color: #6B7280;
    }
    .voucher-right {
      flex: 1;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .voucher-desc {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 6px;
    }
    .voucher-condition {
      font-size: 13px;
      color: var(--text-gray);
      margin-bottom: 4px;
    }
    .voucher-expiry {
      font-size: 12px;
      color: #9CA3AF;
      margin-bottom: 10px;
    }
    .voucher-code-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .voucher-code {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
      background: var(--primary-light);
      padding: 4px 12px;
      border-radius: 6px;
      letter-spacing: 1px;
    }
    .btn-copy {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid var(--primary);
      background: transparent;
      color: var(--primary);
      cursor: pointer;
      transition: var(--transition);
      font-weight: 600;
    }
    .btn-copy:hover {
      background: var(--primary);
      color: #fff;
    }
    .voucher-status-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 6px;
    }
    .voucher-status-badge.used {
      background: #F3F4F6;
      color: #6B7280;
    }
    .voucher-status-badge.expired {
      background: #FEE2E2;
      color: #DC2626;
    }
    @media (max-width: 576px) {
      .voucher-card {
        flex-direction: column;
      }
      .voucher-left {
        width: 100%;
        flex-direction: row;
        gap: 10px;
        padding: 14px;
        border-right: none;
        border-bottom: 2px dashed var(--border);
      }
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <div class="container">
    <div class="breadcrumb-custom">
      <a href="/">Trang chủ</a>
      <span class="separator"><i class="bi bi-chevron-right"></i></span>
      <span class="current">Ví ưu đãi & Voucher</span>
    </div>
  </div>

  <div class="profile-wrapper">
    <div class="container">
      <div class="row g-4">
        <!-- Sidebar -->
        <div class="col-lg-3">
          <div class="profile-sidebar">
            <div class="sidebar-user">
              <div class="sidebar-avatar">
                <i class="bi bi-person-fill"></i>
              </div>
              <div class="sidebar-name" id="sidebarName">---</div>
              <span class="sidebar-badge">Thành viên</span>
            </div>
            <ul class="sidebar-menu">
              <li><a href="/pages/ho-so.html"><i class="bi bi-person"></i> Hồ sơ cá nhân</a></li>
              <li><a href="/pages/don-hang.html"><i class="bi bi-box-seam"></i> Lịch sử đơn hàng</a></li>
              <li><a href="/pages/thong-bao.html"><i class="bi bi-bell"></i> Thông báo</a></li>
              <li><a href="/pages/voucher.html" class="active"><i class="bi bi-gift"></i> Ví ưu đãi & Voucher</a></li>
              <li><a href="/pages/dia-chi.html"><i class="bi bi-geo-alt"></i> Địa chỉ giao hàng</a></li>
              <li><a href="/pages/cai-dat.html"><i class="bi bi-gear"></i> Cài đặt tài khoản</a></li>
              <li class="menu-divider"></li>
              <li><a href="#" class="logout-link" onclick="logout(); return false;"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a></li>
            </ul>
            <div class="sidebar-cards">
              <div class="sidebar-stat-card">
                <div class="stat-icon"><i class="bi bi-star-fill"></i></div>
                <div class="stat-info">
                  <div class="stat-value" id="sidebarPoints">5000 Pts</div>
                  <div class="stat-label">Điểm tích lũy</div>
                </div>
              </div>
              <div class="sidebar-stat-card">
                <div class="stat-icon"><i class="bi bi-ticket-perforated"></i></div>
                <div class="stat-info">
                  <div class="stat-value" id="sidebarVouchers">0 mã giảm giá</div>
                  <div class="stat-label">Voucher hiện có</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Content -->
        <div class="col-lg-9">
          <div class="profile-header">
            <div class="profile-header-title">
              <h2>Ví ưu đãi & Voucher</h2>
              <p>Danh sách mã giảm giá của bạn</p>
            </div>
          </div>

          <!-- Tabs -->
          <div class="order-tabs">
            <button class="order-tab active" data-tab="available" onclick="switchTab('available')">
              Voucher khả dụng <span id="countAvailable"></span>
            </button>
            <button class="order-tab" data-tab="used" onclick="switchTab('used')">
              Voucher đã dùng
            </button>
            <button class="order-tab" data-tab="expired" onclick="switchTab('expired')">
              Voucher hết hạn
            </button>
          </div>

          <div id="voucherList">
            <div class="text-center py-5">
              <div class="spinner-custom mx-auto"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/voucher.js"></script>
</body>
</html>
