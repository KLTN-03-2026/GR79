<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Blog - Admin Sách Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/admin.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <i class="bi bi-book-half"></i>
      <span>Sach Hub <span class="badge-admin">ADMIN</span></span>
    </div>
    <nav class="sidebar-menu">
      <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="sach.html"><i class="bi bi-book"></i> Quản lý sách</a>
      <a href="don-hang.html"><i class="bi bi-box-seam"></i> Đơn hàng</a>
      <a href="danh-muc.html"><i class="bi bi-grid"></i> Danh mục</a>
      <a href="nguoi-dung.html" data-role="admin"><i class="bi bi-people"></i> Người dùng</a>
      <a href="khuyen-mai.html" data-role="admin"><i class="bi bi-tag"></i> Khuyến mãi</a>
      <a href="blog.html" class="active" data-role="admin"><i class="bi bi-newspaper"></i> Blog</a>
      <a href="lien-he.html"><i class="bi bi-chat-dots"></i> Liên hệ</a>
      <a href="chat.html" data-role="staff"><i class="bi bi-headset"></i> Chat</a>
      <a href="thong-bao.html" data-role="admin"><i class="bi bi-bell"></i> Thông báo</a>
      <a href="tuyen-dung.html" data-role="admin"><i class="bi bi-briefcase"></i> Tuyển dụng</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="/"><i class="bi bi-arrow-left-circle"></i> Về Website</a>
      <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Đăng xuất</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <header class="admin-topbar">
      <div class="topbar-title">
        <h1>Quản lý Blog</h1>
        <p>Quản lý các bài viết blog trên website</p>
      </div>
      <div class="topbar-actions">
        <a href="blog-form.html" class="btn-primary-admin">
          <i class="bi bi-plus-lg"></i> Viết bài mới
        </a>
        <button class="btn-icon"><i class="bi bi-search"></i></button>
        <button class="btn-icon">
          <i class="bi bi-bell"></i>
          <span class="badge-dot"></span>
        </button>
        <div class="topbar-avatar" id="avatarUser">A</div>
      </div>
    </header>

    <div class="admin-content">
      <div class="admin-card">
        <div style="overflow-x: auto;">
          <table class="admin-table">
            <thead>
              <tr>
                <th>STT</th>
                <th>Ảnh</th>
                <th>Tiêu đề</th>
                <th>Danh mục</th>
                <th>Tác giả</th>
                <th>Lượt xem</th>
                <th>Ngày đăng</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="blogsTable">
              <tr><td colspan="9" class="text-center py-4">Đang tải...</td></tr>
            </tbody>
          </table>
        </div>
        <!-- Pagination -->
        <div class="admin-pagination">
          <nav>
            <ul class="pagination" id="pagination"></ul>
          </nav>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toastContainer" class="toast-container-admin"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin/blog.js"></script>
</body>
</html>
