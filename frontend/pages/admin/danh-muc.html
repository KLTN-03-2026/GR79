<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Danh mục - Admin Sách Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/admin.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <i class="bi bi-book-half"></i>
      <span>Sach Hub <span class="badge-admin">ADMIN</span></span>
    </div>
    <nav class="sidebar-menu">
      <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="sach.html"><i class="bi bi-book"></i> Quản lý sách</a>
      <a href="don-hang.html"><i class="bi bi-box-seam"></i> Đơn hàng</a>
      <a href="danh-muc.html" class="active"><i class="bi bi-grid"></i> Danh mục</a>
      <a href="nguoi-dung.html" data-role="admin"><i class="bi bi-people"></i> Người dùng</a>
      <a href="khuyen-mai.html" data-role="admin"><i class="bi bi-tag"></i> Khuyến mãi</a>
      <a href="blog.html" data-role="admin"><i class="bi bi-newspaper"></i> Blog</a>
      <a href="lien-he.html"><i class="bi bi-chat-dots"></i> Liên hệ</a>
      <a href="chat.html" data-role="staff"><i class="bi bi-headset"></i> Chat</a>
      <a href="thong-bao.html" data-role="admin"><i class="bi bi-bell"></i> Thông báo</a>
      <a href="tuyen-dung.html" data-role="admin"><i class="bi bi-briefcase"></i> Tuyển dụng</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="/"><i class="bi bi-arrow-left-circle"></i> Về Website</a>
      <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Đăng xuất</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <header class="admin-topbar">
      <div class="topbar-title">
        <h1>Quản lý Danh mục</h1>
        <p>Quản lý các danh mục sách trong hệ thống</p>
      </div>
      <div class="topbar-actions">
        <button class="btn-primary-admin" data-bs-toggle="modal" data-bs-target="#categoryModal" onclick="openAddModal()">
          <i class="bi bi-plus-lg"></i> Thêm danh mục
        </button>
        <button class="btn-icon"><i class="bi bi-search"></i></button>
        <button class="btn-icon">
          <i class="bi bi-bell"></i>
          <span class="badge-dot"></span>
        </button>
        <div class="topbar-avatar" id="avatarUser">A</div>
      </div>
    </header>

    <div class="admin-content">
      <div class="admin-card">
        <div style="overflow-x: auto;">
          <table class="admin-table">
            <thead>
              <tr>
                <th>STT</th>
                <th>Ảnh</th>
                <th>Tên danh mục</th>
                <th>Slug</th>
                <th>Số sách</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="categoriesTable">
              <tr><td colspan="7" class="text-center py-4">Đang tải...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="admin-pagination">
          <nav>
            <ul class="pagination" id="pagination"></ul>
          </nav>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal Thêm/Sửa -->
  <div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Thêm danh mục</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="categoryForm">
          <div class="modal-body">
            <input type="hidden" id="categoryId">
            <div class="mb-3">
              <label class="form-label fw-semibold">Tên danh mục <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="categoryName" required placeholder="Nhập tên danh mục">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Mô tả</label>
              <textarea class="form-control" id="categoryDesc" rows="3" placeholder="Mô tả ngắn về danh mục"></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Ảnh danh mục</label>
              <input type="file" class="form-control" id="categoryImage" accept="image/*">
              <div id="imagePreview" class="mt-2"></div>
            </div>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" id="categoryActive" checked>
              <label class="form-check-label" for="categoryActive">Hoạt động</label>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
            <button type="submit" class="btn-primary-admin" id="btnSave">
              <i class="bi bi-check-lg"></i> Lưu
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toastContainer" class="toast-container-admin"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin/categories.js"></script>
</body>
</html>
