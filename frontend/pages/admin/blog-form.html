<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viết bài Blog - Admin Sách Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/admin.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <i class="bi bi-book-half"></i>
      <span>Sach Hub <span class="badge-admin">ADMIN</span></span>
    </div>
    <nav class="sidebar-menu">
      <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="sach.html"><i class="bi bi-book"></i> Quản lý sách</a>
      <a href="don-hang.html"><i class="bi bi-box-seam"></i> Đơn hàng</a>
      <a href="danh-muc.html"><i class="bi bi-grid"></i> Danh mục</a>
      <a href="nguoi-dung.html" data-role="admin"><i class="bi bi-people"></i> Người dùng</a>
      <a href="khuyen-mai.html" data-role="admin"><i class="bi bi-tag"></i> Khuyến mãi</a>
      <a href="blog.html" class="active" data-role="admin"><i class="bi bi-newspaper"></i> Blog</a>
      <a href="lien-he.html"><i class="bi bi-chat-dots"></i> Liên hệ</a>
      <a href="chat.html" data-role="staff"><i class="bi bi-headset"></i> Chat</a>
      <a href="thong-bao.html" data-role="admin"><i class="bi bi-bell"></i> Thông báo</a>
      <a href="tuyen-dung.html" data-role="admin"><i class="bi bi-briefcase"></i> Tuyển dụng</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="/"><i class="bi bi-arrow-left-circle"></i> Về Website</a>
      <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Đăng xuất</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <header class="admin-topbar">
      <div class="topbar-title">
        <h1 id="pageTitle">Viết bài mới</h1>
        <p><a href="blog.html" style="color: var(--primary);"><i class="bi bi-arrow-left"></i> Quay lại danh sách</a></p>
      </div>
    </header>

    <div class="admin-content">
      <div class="admin-card">
        <div class="card-body" style="padding: 24px;">
          <form id="blogForm">
            <input type="hidden" id="blogId">

            <div class="mb-3">
              <label class="form-label fw-semibold">Tiêu đề <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="blogTitle" required placeholder="Nhập tiêu đề bài viết">
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Danh mục</label>
                <select class="form-select" id="blogCategory">
                  <option value="Review Sách">Review Sách</option>
                  <option value="Tin Tức Xuất Bản">Tin Tức Xuất Bản</option>
                  <option value="Tác Giả">Tác Giả</option>
                  <option value="Kinh Nghiệm Đọc">Kinh Nghiệm Đọc</option>
                  <option value="Sự Kiện">Sự Kiện</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Tags</label>
                <input type="text" class="form-control" id="blogTags" placeholder="sach, review, van-hoc (phân cách bằng dấu phẩy)">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Mô tả ngắn</label>
              <textarea class="form-control" id="blogExcerpt" rows="2" placeholder="Mô tả ngắn hiển thị ở trang danh sách"></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Nội dung <span class="text-danger">*</span></label>
              <textarea class="form-control" id="blogContent" rows="10" required placeholder="Nội dung bài viết..."></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Ảnh đại diện</label>
              <input type="file" class="form-control" id="blogImage" accept="image/*">
              <div id="blogImagePreview" class="mt-2"></div>
            </div>

            <div class="form-check form-switch mb-4">
              <input class="form-check-input" type="checkbox" id="blogPublished" checked>
              <label class="form-check-label" for="blogPublished">Xuất bản</label>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn-primary-admin" id="btnSaveBlog">
                <i class="bi bi-check-lg"></i> Lưu bài viết
              </button>
              <a href="blog.html" class="btn btn-secondary">Hủy</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toastContainer" class="toast-container-admin"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin/blog-form.js"></script>
</body>
</html>
