<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng tin tuyển dụng - Admin Sách Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/admin.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <i class="bi bi-book-half"></i>
      <span>Sach Hub <span class="badge-admin">ADMIN</span></span>
    </div>
    <nav class="sidebar-menu">
      <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="sach.html"><i class="bi bi-book"></i> Quản lý sách</a>
      <a href="don-hang.html"><i class="bi bi-box-seam"></i> Đơn hàng</a>
      <a href="danh-muc.html"><i class="bi bi-grid"></i> Danh mục</a>
      <a href="nguoi-dung.html" data-role="admin"><i class="bi bi-people"></i> Người dùng</a>
      <a href="khuyen-mai.html" data-role="admin"><i class="bi bi-tag"></i> Khuyến mãi</a>
      <a href="blog.html" data-role="admin"><i class="bi bi-newspaper"></i> Blog</a>
      <a href="lien-he.html"><i class="bi bi-chat-dots"></i> Liên hệ</a>
      <a href="chat.html" data-role="staff"><i class="bi bi-headset"></i> Chat</a>
      <a href="thong-bao.html" data-role="admin"><i class="bi bi-bell"></i> Thông báo</a>
      <a href="tuyen-dung.html" class="active" data-role="admin"><i class="bi bi-briefcase"></i> Tuyển dụng</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="/"><i class="bi bi-arrow-left-circle"></i> Về Website</a>
      <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Đăng xuất</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <header class="admin-topbar">
      <div class="topbar-title">
        <h1 id="pageTitle">Đăng tin tuyển dụng</h1>
        <p><a href="tuyen-dung.html" style="color: var(--primary);"><i class="bi bi-arrow-left"></i> Quay lại danh sách</a></p>
      </div>
    </header>

    <div class="admin-content">
      <div class="admin-card">
        <div class="card-body" style="padding: 24px;">
          <form id="jobForm">
            <input type="hidden" id="jobId">

            <div class="mb-3">
              <label class="form-label fw-semibold">Tiêu đề công việc <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="jobTitle" required placeholder="VD: Senior Fullstack Developer">
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Phòng ban <span class="text-danger">*</span></label>
                <select class="form-select" id="jobDepartment" required>
                  <option value="Công nghệ">Công nghệ</option>
                  <option value="Marketing">Marketing</option>
                  <option value="Vận hành">Vận hành</option>
                  <option value="CSKH">CSKH</option>
                  <option value="Kế toán">Kế toán</option>
                  <option value="Khác">Khác</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Loại hình</label>
                <select class="form-select" id="jobType">
                  <option value="Toàn thời gian">Toàn thời gian</option>
                  <option value="Bán thời gian">Bán thời gian</option>
                  <option value="Thực tập">Thực tập</option>
                  <option value="Cộng tác viên">Cộng tác viên</option>
                </select>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Địa điểm</label>
                <input type="text" class="form-control" id="jobLocation" value="TP. Hồ Chí Minh">
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Mức lương</label>
                <input type="text" class="form-control" id="jobSalary" placeholder="VD: 15-25 triệu" value="Thỏa thuận">
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-4">
                <label class="form-label fw-semibold">Kinh nghiệm</label>
                <input type="text" class="form-control" id="jobExperience" placeholder="VD: 1-2 năm" value="1-2 năm">
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Số lượng tuyển</label>
                <input type="number" class="form-control" id="jobQuantity" min="1" value="1">
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Hạn nộp hồ sơ</label>
                <input type="date" class="form-control" id="jobDeadline">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Mô tả công việc</label>
              <textarea class="form-control" id="jobDescription" rows="4" placeholder="Mô tả công việc tổng quan..."></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Yêu cầu ứng viên</label>
              <textarea class="form-control" id="jobRequirements" rows="5" placeholder="Mỗi dòng là 1 yêu cầu..."></textarea>
              <small class="text-muted">Mỗi dòng tương ứng 1 yêu cầu</small>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Quyền lợi</label>
              <textarea class="form-control" id="jobBenefits" rows="4" placeholder="Mỗi dòng là 1 quyền lợi..."></textarea>
            </div>

            <div class="form-check form-switch mb-4">
              <input class="form-check-input" type="checkbox" id="jobIsActive" checked>
              <label class="form-check-label" for="jobIsActive">Đang tuyển</label>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn-primary-admin" id="btnSaveJob">
                <i class="bi bi-check-lg"></i> Lưu tin tuyển dụng
              </button>
              <a href="tuyen-dung.html" class="btn btn-secondary">Hủy</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toastContainer" class="toast-container-admin"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin/tuyen-dung-form.js"></script>
</body>
</html>
