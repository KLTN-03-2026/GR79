<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết sách - Sách Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/product-detail.css">
</head>
<body class="product-detail-page">
  <div id="site-header"></div>

  <!-- Main Content -->
  <main>
    <div class="container">
      <!-- Breadcrumb -->
      <div class="breadcrumb-custom" id="breadcrumb">
        <a href="/">Trang chủ</a>
        <span class="separator"><i class="bi bi-chevron-right"></i></span>
        <span class="current" id="breadcrumbCategory">Đang tải...</span>
      </div>

      <!-- Product Detail -->
      <div class="row" id="productDetail">
        <!-- Loading state -->
        <div class="col-lg-5">
          <div class="skeleton" style="aspect-ratio: 3/4; width: 100%;"></div>
        </div>
        <div class="col-lg-7">
          <div class="skeleton mb-3" style="height: 32px; width: 80%;"></div>
          <div class="skeleton mb-3" style="height: 20px; width: 40%;"></div>
          <div class="skeleton mb-3" style="height: 60px; width: 100%;"></div>
          <div class="skeleton mb-3" style="height: 44px; width: 50%;"></div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="product-tabs" id="productTabs" style="display: none;">
        <ul class="nav nav-tabs" role="tablist">
          <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabDescription" type="button" role="tab">Mô tả sản phẩm</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabDetails" type="button" role="tab">Thông tin chi tiết</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabReviews" type="button" role="tab">Đánh giá (<span id="reviewCount">0</span>)</button>
          </li>
        </ul>
        <div class="tab-content">
          <div class="tab-pane fade show active" id="tabDescription" role="tabpanel">
            <div class="tab-description" id="bookDescription">
              <!-- Load via JS -->
            </div>
          </div>
          <div class="tab-pane fade" id="tabDetails" role="tabpanel">
            <table class="detail-table" id="bookDetails">
              <!-- Load via JS -->
            </table>
          </div>
          <div class="tab-pane fade" id="tabReviews" role="tabpanel">
            <div id="reviewsContent">
              <!-- Load via JS -->
            </div>
          </div>
        </div>
      </div>

      <!-- Related Products -->
      <section class="related-products" id="relatedSection" style="display: none;">
        <div class="section-title">
          <span>Sản phẩm liên quan</span>
          <a href="#" class="view-all" id="viewAllRelated">Xem tất cả <i class="bi bi-arrow-right"></i></a>
        </div>
        <div class="row g-3" id="relatedBooks">
          <!-- Load via JS -->
        </div>
      </section>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/product-detail.js"></script>
</body>
</html>
