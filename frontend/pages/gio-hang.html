<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giỏ hàng - Sách Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/cart.css">
</head>
<body>
  <div id="site-header"></div>

  <!-- Main Content -->
  <main class="cart-page">
    <div class="container">
      <!-- Breadcrumb -->
      <div class="breadcrumb-custom">
        <a href="/">Trang chủ</a>
        <span class="separator"><i class="bi bi-chevron-right"></i></span>
        <span class="current">Giỏ hàng của bạn</span>
      </div>

      <!-- Title -->
      <h1 class="cart-title">GIỎ HÀNG <span id="cartItemCount">(0 sản phẩm)</span></h1>

      <!-- Tabs -->
      <div class="cart-tabs">
        <button class="cart-tab-item active">
          <i class="bi bi-bag"></i> Tất cả
          <span class="tab-count" id="tabAllCount">0</span>
        </button>
        <button class="cart-tab-item">
          <i class="bi bi-receipt"></i> Đặt hàng
        </button>
        <button class="cart-tab-item">
          <i class="bi bi-gear"></i> Xử lý
        </button>
        <button class="cart-tab-item">
          <i class="bi bi-truck"></i> Vận chuyển
        </button>
        <button class="cart-tab-item">
          <i class="bi bi-check-circle"></i> Thành công
        </button>
      </div>

      <!-- Cart Content -->
      <div id="cartContent">
        <div class="row g-4">
          <!-- Left Column - Cart Items -->
          <div class="col-lg-8">
            <div id="cartTableArea">
              <div class="text-center py-5">
                <div class="spinner-custom mx-auto"></div>
              </div>
            </div>

            <!-- Cart Actions -->
            <div class="cart-actions" id="cartActions" style="display:none;">
              <button class="cart-clear-btn" onclick="clearCart()">
                <i class="bi bi-trash3"></i> Xóa hết giỏ hàng
              </button>
              <a href="/" style="color: var(--primary);">
                <i class="bi bi-arrow-left"></i> Mua thêm sản phẩm
              </a>
            </div>
          </div>

          <!-- Right Column - Summary -->
          <div class="col-lg-4">
            <div class="cart-summary" id="cartSummary" style="display:none;">
              <h3 class="cart-summary-title">Tạm tính đơn hàng</h3>

              <div class="summary-row">
                <span class="label">Tạm tính</span>
                <span class="value" id="subtotalValue">0đ</span>
              </div>
              <div class="summary-row">
                <span class="label">Phí vận chuyển</span>
                <span class="value" id="shippingValue">30,000đ</span>
              </div>

              <!-- Coupon -->
              <div class="coupon-input-group" id="couponArea">
                <input type="text" id="couponInput" placeholder="Nhập mã giảm giá">
                <button onclick="applyCoupon()">Áp dụng</button>
              </div>
              <div class="coupon-applied" id="couponApplied" style="display:none;">
                <i class="bi bi-tag-fill"></i>
                <span id="couponLabel">Mã: ---</span>
                <button class="remove-coupon" onclick="removeCoupon()"><i class="bi bi-x-lg"></i></button>
              </div>

              <div class="summary-row discount" id="discountRow" style="display:none;">
                <span class="label">Giảm giá</span>
                <span class="value" id="discountValue">-0đ</span>
              </div>

              <hr class="summary-divider">

              <div class="summary-total">
                <span class="label">Tổng cộng</span>
                <span class="value" id="totalValue">0đ</span>
              </div>

              <button class="btn-checkout" id="btnCheckout" onclick="goToCheckout()">
                <i class="bi bi-lock-fill"></i> THANH TOÁN NGAY
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Suggested Section -->
      <section class="suggested-section">
        <div class="section-title">
          <span>Có thể bạn cũng thích</span>
          <a href="/" class="view-all">Xem tất cả <i class="bi bi-arrow-right"></i></a>
        </div>
        <div class="row g-3" id="suggestedBooks">
          <!-- Load via JS -->
        </div>
      </section>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/cart.js"></script>
</body>
</html>
